name: Update CBK key rates

# Scrapes the Central Bank of Kenya "Key Rates" box and commits any changes to
# data/key-rates.csv. The push triggers Cloudflare's build, so the live site
# updates itself — no manual step. Runs twice a day; you can also run it on
# demand from the Actions tab ("Run workflow").
on:
  schedule:
    - cron: "0 6,13 * * *" # 06:00 & 13:00 UTC (09:00 & 16:00 EAT)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Scrape CBK key rates
        run: node Bengula-Jacob/scripts/scrape-cbk-rates.mjs

      - name: Commit & push if changed
        run: |
          if git diff --quiet -- Bengula-Jacob/data/key-rates.csv; then
            echo "No rate changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Bengula-Jacob/data/key-rates.csv
            git commit -m "chore: auto-update CBK key rates"
            git push
          fi
